name: windows-11-validation

on:
  workflow_dispatch:
    inputs:
      require_windows_11:
        description: "Fail if the runner is not Windows 11."
        required: true
        default: false
        type: boolean
      run_self_hosted_windows11:
        description: "Also run on a self-hosted runner labeled Windows11."
        required: true
        default: false
        type: boolean

jobs:
  hosted-windows-validation:
    name: hosted-windows-validation
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OneLag.slnx

      - name: Build
        run: dotnet build OneLag.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test OneLag.slnx --configuration Release --no-build

      - name: Publish validation binaries
        shell: pwsh
        run: |
          dotnet publish src/OneLag.Cli/OneLag.Cli.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=0.1.0-validation.${{ github.run_number }} `
            --output artifacts/validation-bin
          dotnet publish src/OneLag.Gui/OneLag.Gui.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=0.1.0-validation.${{ github.run_number }} `
            --output artifacts/validation-bin

      - name: Run Windows validation
        shell: pwsh
        run: |
          $require = [System.Convert]::ToBoolean("${{ inputs.require_windows_11 }}")
          if ($require) {
            scripts/windows11-validation.ps1 -BinDir artifacts/validation-bin -RequireWindows11
          } else {
            scripts/windows11-validation.ps1 -BinDir artifacts/validation-bin
          }

  self-hosted-windows11-validation:
    name: self-hosted-windows11-validation
    if: ${{ inputs.run_self_hosted_windows11 }}
    runs-on:
      - self-hosted
      - Windows
      - X64
      - Windows11

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OneLag.slnx

      - name: Build
        run: dotnet build OneLag.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test OneLag.slnx --configuration Release --no-build

      - name: Publish validation binaries
        shell: pwsh
        run: |
          dotnet publish src/OneLag.Cli/OneLag.Cli.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=0.1.0-validation.${{ github.run_number }} `
            --output artifacts/validation-bin
          dotnet publish src/OneLag.Gui/OneLag.Gui.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=0.1.0-validation.${{ github.run_number }} `
            --output artifacts/validation-bin

      - name: Run Windows 11 validation
        shell: pwsh
        run: scripts/windows11-validation.ps1 -BinDir artifacts/validation-bin -RequireWindows11

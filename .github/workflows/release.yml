name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OneLag.slnx

      - name: Build
        run: dotnet build OneLag.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test OneLag.slnx --configuration Release --no-build

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "0.1.0-preview.${{ github.run_number }}"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish Windows x64
        shell: pwsh
        run: |
          dotnet publish src/OneLag.Cli/OneLag.Cli.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.version }} `
            --output artifacts/publish/win-x64
          dotnet publish src/OneLag.Gui/OneLag.Gui.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.version }} `
            --output artifacts/publish/win-x64-gui

      - name: Smoke published Windows executable
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "artifacts/publish/win-x64/onelag.exe"
          $gui = Join-Path $PWD "artifacts/publish/win-x64-gui/onelag-gui.exe"
          & $exe version
          $guiSmoke = Start-Process -FilePath $gui -ArgumentList "--smoke" -Wait -PassThru
          if ($guiSmoke.ExitCode -ne 0) {
            throw "gui smoke failed with exit code $($guiSmoke.ExitCode)"
          }
          $root = Join-Path $env:RUNNER_TEMP "OneLagReleaseSmokeRoot"
          $report = Join-Path $env:RUNNER_TEMP "onelag-release-report.md"
          $documents = Join-Path $root "Documents"
          New-Item -ItemType Directory -Force -Path $documents | Out-Null
          "content" | Set-Content (Join-Path $documents "file.txt")
          & $exe scan --root $root --output $report --max-items 1000
          if ($LASTEXITCODE -ne 0) {
            throw "scan smoke failed with exit code $LASTEXITCODE"
          }
          if (!(Test-Path $report)) {
            throw "scan smoke did not create report"
          }
          $viewOutput = & $exe view --report $report
          if ($LASTEXITCODE -ne 0) {
            throw "view smoke failed with exit code $LASTEXITCODE"
          }
          if (($viewOutput -join "`n") -notmatch "Kind: Diagnostic") {
            throw "view smoke did not identify diagnostic report"
          }
          $watch = Join-Path $env:RUNNER_TEMP "OneLagWatchSmoke"
          $watchReport = Join-Path $env:RUNNER_TEMP "onelag-watch-smoke.md"
          & $exe watch start --duration 1s --interval 1s --output $watch
          if ($LASTEXITCODE -ne 0) {
            throw "watch start smoke failed with exit code $LASTEXITCODE"
          }
          & $exe watch mark --output $watch --note "release"
          if ($LASTEXITCODE -ne 0) {
            throw "watch mark smoke failed with exit code $LASTEXITCODE"
          }
          & $exe watch report --output $watch --report $watchReport
          if ($LASTEXITCODE -ne 0) {
            throw "watch report smoke failed with exit code $LASTEXITCODE"
          }
          $watchViewOutput = & $exe view --report $watchReport --timeline
          if ($LASTEXITCODE -ne 0) {
            throw "watch view smoke failed with exit code $LASTEXITCODE"
          }
          if (($watchViewOutput -join "`n") -notmatch "Kind: Watch") {
            throw "watch view smoke did not identify watch report"
          }
          $bundle = Join-Path $env:RUNNER_TEMP "onelag-support-bundle-smoke"
          & $exe support bundle --report $report --report $watchReport --output $bundle --zip
          if ($LASTEXITCODE -ne 0) {
            throw "support bundle smoke failed with exit code $LASTEXITCODE"
          }
          if (!(Test-Path (Join-Path $bundle "ANALYZE_WITH_CODEX_OR_CLAUDE.md"))) {
            throw "support bundle smoke did not create analysis prompt"
          }
          if (!(Test-Path "$bundle.zip")) {
            throw "support bundle smoke did not create zip"
          }
          & $exe repair reset-onedrive
          if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 1) {
            throw "repair dry-run returned unexpected exit code $LASTEXITCODE"
          }
          exit 0

      - name: Create installer bundle
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bundle = "artifacts/OneLag-$version-win-x64"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item artifacts/publish/win-x64/* $bundle -Recurse -Force
          Copy-Item artifacts/publish/win-x64-gui/* $bundle -Recurse -Force
          Copy-Item installer/windows/Install-OneLag.ps1 $bundle
          Copy-Item installer/windows/Uninstall-OneLag.ps1 $bundle
          Copy-Item installer/windows/README.md $bundle
          Compress-Archive -Path "$bundle/*" -DestinationPath "artifacts/OneLag-$version-win-x64-installer.zip" -Force
          Get-FileHash "artifacts/OneLag-$version-win-x64-installer.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  OneLag-$version-win-x64-installer.zip" } |
            Set-Content "artifacts/OneLag-$version-win-x64-installer.zip.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: onelag-win-x64-installer
          path: |
            artifacts/*installer.zip
            artifacts/*installer.zip.sha256

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = "OneLag installable preview. Includes self-contained Windows x64 CLI, native Windows tray/GUI with support-bundle export, one-shot scan, fuller OneDrive known-issue detection, Files On-Demand attribute metadata, Windows PDH/process/memory/power performance sampling, Event Viewer summary correlation across core and selected operational channels, WPR/WPA and ProcMon trace-plan generation, offline Codex/Claude-ready support-bundle export, dry-run remediation move-plan generation with rollback/verification scripts, direct move/verify/rollback execution behind explicit confirmation, client-cache health metadata, supported OneDrive reset dry-run/explicit execution, report generation, bounded watch-mode recording, watch episode timeline detection, local report viewing, coverage/smoke-test hardening, Windows validation workflow, and redacted sample reports in source."
          if ("${{ github.ref_name }}".Contains("-")) {
            gh release create "${{ github.ref_name }}" `
              artifacts/*installer.zip `
              artifacts/*installer.zip.sha256 `
              --repo "${{ github.repository }}" `
              --title "OneLag ${{ github.ref_name }}" `
              --notes $notes `
              --prerelease
          } else {
            gh release create "${{ github.ref_name }}" `
              artifacts/*installer.zip `
              artifacts/*installer.zip.sha256 `
              --repo "${{ github.repository }}" `
              --title "OneLag ${{ github.ref_name }}" `
              --notes $notes
          }

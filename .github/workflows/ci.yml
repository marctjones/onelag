name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OneLag.slnx

      - name: Format
        run: dotnet format OneLag.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build OneLag.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test OneLag.slnx --configuration Release --no-build

      - name: Coverage
        if: runner.os == 'macOS'
        run: scripts/test-coverage.sh

      - name: Upload coverage artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cobertura
          path: |
            tmp/coverage/**/*.xml
            tmp/coverage/coverage-summary.txt

      - name: Publish Windows x64 CLI compile check
        run: >
          dotnet publish src/OneLag.Cli/OneLag.Cli.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=0.1.0-ci.${{ github.run_number }}
          --output artifacts/publish/win-x64

      - name: Publish Windows x64 GUI compile check
        run: >
          dotnet publish src/OneLag.Gui/OneLag.Gui.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=0.1.0-ci.${{ github.run_number }}
          --output artifacts/publish/win-x64-gui

      - name: Smoke published Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "artifacts/publish/win-x64/onelag.exe"
          $gui = Join-Path $PWD "artifacts/publish/win-x64-gui/onelag-gui.exe"
          & $exe version
          $guiSmoke = Start-Process -FilePath $gui -ArgumentList "--smoke" -Wait -PassThru
          if ($guiSmoke.ExitCode -ne 0) {
            throw "gui smoke failed with exit code $($guiSmoke.ExitCode)"
          }
          $root = Join-Path $env:RUNNER_TEMP "OneLagSmokeRoot"
          $report = Join-Path $env:RUNNER_TEMP "onelag-ci-report.md"
          $documents = Join-Path $root "Documents"
          New-Item -ItemType Directory -Force -Path $documents | Out-Null
          "content" | Set-Content (Join-Path $documents "file.txt")
          & $exe scan --root $root --output $report --max-items 1000
          if ($LASTEXITCODE -ne 0) {
            throw "scan smoke failed with exit code $LASTEXITCODE"
          }
          if (!(Test-Path $report)) {
            throw "scan smoke did not create report"
          }
          $viewOutput = & $exe view --report $report
          if ($LASTEXITCODE -ne 0) {
            throw "view smoke failed with exit code $LASTEXITCODE"
          }
          if (($viewOutput -join "`n") -notmatch "Kind: Diagnostic") {
            throw "view smoke did not identify diagnostic report"
          }

      # Hosted Windows runners are elevated, so this is the one place the kernel ETW path actually executes.
      # It guards the two ways the driver trace fails silently: the native KernelTraceControl.dll being lost
      # by single-file publish, and the session hanging instead of stopping at the end of its window.
      - name: Smoke kernel driver trace
        if: runner.os == 'Windows'
        timeout-minutes: 3
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "artifacts/publish/win-x64/onelag.exe"
          $trace = Join-Path $env:RUNNER_TEMP "onelag-ci-trace.md"
          & $exe trace dpc --duration 10s --output $trace
          if ($LASTEXITCODE -ne 0) {
            throw "trace dpc smoke failed with exit code $LASTEXITCODE"
          }
          if (!(Test-Path $trace)) {
            throw "trace dpc smoke did not create report"
          }
          $traceText = Get-Content $trace -Raw
          if ($traceText -match "trace-runtime-unavailable") {
            throw "trace dpc could not load its native dependency; KernelTraceControl.dll is missing from the published payload"
          }
          if ($traceText -match "requires-administrator") {
            throw "trace dpc did not detect elevation on an elevated runner"
          }
          if ($traceText -notmatch "windows-kernel-etw") {
            throw "trace dpc did not run a kernel session; report said: $traceText"
          }

      # The only place the wevtutil export and the Windows-tree walk actually run.
      - name: Smoke log collection
        if: runner.os == 'Windows'
        timeout-minutes: 5
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "artifacts/publish/win-x64/onelag.exe"
          $bundle = Join-Path $env:RUNNER_TEMP "onelag-ci-logs"
          & $exe collect --hours 48 --output $bundle --max-total-mb 256 --no-zip
          if ($LASTEXITCODE -ne 0) {
            throw "collect smoke failed with exit code $LASTEXITCODE"
          }
          $manifest = Join-Path $bundle "manifest.json"
          foreach ($required in @("manifest.json", "PRIVACY.txt", "README.md", "analysis-prompt.md")) {
            if (!(Test-Path (Join-Path $bundle $required))) {
              throw "collect smoke did not produce $required"
            }
          }
          $eventLogs = Get-ChildItem (Join-Path $bundle "eventlogs") -Filter *.xml -ErrorAction SilentlyContinue
          if (-not $eventLogs) {
            throw "collect smoke produced no event-log exports; wevtutil path is broken"
          }
          $system = $eventLogs | Where-Object { $_.Name -like "System*" } | Select-Object -First 1
          if ($system -and ((Get-Content $system.FullName -Raw) -notmatch "<Event")) {
            throw "collect smoke event-log export contained no events"
          }
          $watch = Join-Path $env:RUNNER_TEMP "OneLagWatchSmoke"
          $watchReport = Join-Path $env:RUNNER_TEMP "onelag-watch-smoke.md"
          & $exe watch start --duration 1s --interval 1s --output $watch
          if ($LASTEXITCODE -ne 0) {
            throw "watch start smoke failed with exit code $LASTEXITCODE"
          }
          & $exe watch mark --output $watch --note "ci"
          if ($LASTEXITCODE -ne 0) {
            throw "watch mark smoke failed with exit code $LASTEXITCODE"
          }
          & $exe watch report --output $watch --report $watchReport
          if ($LASTEXITCODE -ne 0) {
            throw "watch report smoke failed with exit code $LASTEXITCODE"
          }
          $watchViewOutput = & $exe view --report $watchReport --timeline
          if ($LASTEXITCODE -ne 0) {
            throw "watch view smoke failed with exit code $LASTEXITCODE"
          }
          if (($watchViewOutput -join "`n") -notmatch "Kind: Watch") {
            throw "watch view smoke did not identify watch report"
          }
          $bundle = Join-Path $env:RUNNER_TEMP "onelag-support-bundle-smoke"
          & $exe support bundle --report $report --report $watchReport --output $bundle --zip
          if ($LASTEXITCODE -ne 0) {
            throw "support bundle smoke failed with exit code $LASTEXITCODE"
          }
          if (!(Test-Path (Join-Path $bundle "ANALYZE_WITH_CODEX_OR_CLAUDE.md"))) {
            throw "support bundle smoke did not create analysis prompt"
          }
          if (!(Test-Path "$bundle.zip")) {
            throw "support bundle smoke did not create zip"
          }
          & $exe repair reset-onedrive
          if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 1) {
            throw "repair dry-run returned unexpected exit code $LASTEXITCODE"
          }
          exit 0
